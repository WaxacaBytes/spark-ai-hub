services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.02-py3
    container_name: sparkdeck-vllm-llama31-8b-nvfp4
    ports:
      - "8021:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - vllm
      - serve
      - nvidia/Llama-3.1-8B-Instruct-NVFP4
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - llama3_json
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.25"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
