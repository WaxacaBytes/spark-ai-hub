services:
  vllm:
    image: vllm/vllm-openai:minimax27
    container_name: spark-ai-hub-llamacpp-minimax-m27-q3ks
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
    ipc: host
    command:
      - --model
      - MJPansa/MiniMax-M2.7-REAP-172B-A10B-AutoRound-W4A16
      - --port
      - "8000"
      - --trust-remote-code
      - --max-model-len
      - "65536"
      - --served-model-name
      - minimax-m2.7
      - --gpu-memory-utilization
      - "0.88"
      - --kv-cache-dtype
      - fp8
      - --load-format
      - fastsafetensors
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - minimax_m2
      - --reasoning-parser
      - minimax_m2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
