services:
  comfyui:
    image: abelpc/comfyui-spark:main
    container_name: sparkforge-comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/app/ComfyUI/models
      - comfyui-output:/app/ComfyUI/output
      - comfyui-input:/app/ComfyUI/input
      # Dev mounts — edit locally, restart container to apply
      - /home/abel/sparkforge/comfyui-src/custom_nodes/server_download.py:/app/ComfyUI/custom_nodes/server_download.py
      - /home/abel/sparkforge/comfyui-src/web_patches:/app/web_patches
      - /home/abel/sparkforge/docker/comfyui-spark/entrypoint.sh:/app/entrypoint.sh
    environment:
      - COMFYUI_DEV=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  comfyui-models:
  comfyui-output:
  comfyui-input:
