services:
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: sparkdeck-vllm-deepseek-r1-qwen-32b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
      - --port
      - "8000"
      - --max-model-len
      - "48000"
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.70"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
