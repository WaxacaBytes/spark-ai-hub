services:
  atlas:
    image: avarok/atlas-gb10:latest
    container_name: spark-ai-hub-atlas-qwen35-122b-a10b-nvfp4
    ports:
      - "9001:8888"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
    ipc: host
    command:
      - serve
      - RedHatAI/Qwen3.5-122B-A10B-NVFP4
      - --bind
      - 0.0.0.0
      - --port
      - "8888"
      - --max-seq-len
      - "262144"
      - --max-batch-size
      - "1"
      - --kv-cache-dtype
      - nvfp4
      - --gpu-memory-utilization
      - "0.98"
      - --scheduling-policy
      - slai
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
