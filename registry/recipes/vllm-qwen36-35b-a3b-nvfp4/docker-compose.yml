services:
  vllm:
    # NVIDIA's nvidia/Qwen3.6-35B-A3B-NVFP4 card needs a vLLM that understands
    # its W4A16_NVFP4 MIXED_PRECISION experts (0.20.0 can't load them). Pinned
    # to the *stable release* v0.24.0 (a permanent, pullable tag) rather than a
    # nightly SHA tag, which Docker Hub garbage-collects within ~a day and thus
    # breaks clean from-scratch reinstalls. cu129 runs fine on the CUDA 13 host.
    image: vllm/vllm-openai:v0.24.0-aarch64-cu129
    container_name: spark-ai-hub-vllm-qwen36-35b-a3b-nvfp4
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
      # NVIDIA's recommended DGX Spark (GB10, sm_121a) environment for this checkpoint.
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_FP8_MOE_BACKEND=flashinfer_cutlass
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - CUTE_DSL_ARCH=sm_121a
    ipc: host
    # Command per NVIDIA's "NVIDIA DGX Spark" serving recipe on the model card.
    command:
      - --model
      - nvidia/Qwen3.6-35B-A3B-NVFP4
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --trust-remote-code
      - --dtype
      - auto
      - --quantization
      - modelopt
      - --kv-cache-dtype
      - fp8
      - --attention-backend
      - flashinfer
      - --moe-backend
      - marlin
      - --gpu-memory-utilization
      # Right-sized for 1x full-256k session (leanest). ~14 GiB NVFP4 weights +
      # fp8 KV; 0.25 holds well over 1x 262144-token concurrency. Frees ~70 GiB.
      - "0.33"
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "8192"
      - --enable-chunked-prefill
      - --async-scheduling
      - --enable-prefix-caching
      # Video: hand frame sampling back to do_sample_frames+fps (vLLM otherwise
      # applies a default frame cap and silently ignores the requested fps), and
      # allow multiple videos per prompt. Per the model card's DGX Spark recipe.
      - --media-io-kwargs
      - '{"video": {"num_frames": -1}}'
      - --limit-mm-per-prompt
      - '{"video": 4}'
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
