services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-aarch64-cu130
    container_name: spark-ai-hub-vllm-gpt-oss-20b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
      - TIKTOKEN_ENCODINGS_BASE=/root/.cache/huggingface/tiktoken_encodings
    ipc: host
    entrypoint: ["vllm", "serve"]
    command:
      - --model
      - openai/gpt-oss-20b
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.30"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
