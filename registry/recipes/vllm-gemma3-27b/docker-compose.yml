services:
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: sparkdeck-vllm-gemma3-27b
    ports:
      - "8057:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - google/gemma-3-27b-it
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --dtype
      - bfloat16
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.55"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
