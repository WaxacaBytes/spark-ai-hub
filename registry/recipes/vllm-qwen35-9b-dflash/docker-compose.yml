services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
    image: spark-ai-hub/vllm-qwen35-9b-dflash:v0.20.0-aarch64-cu130
    container_name: spark-ai-hub-vllm-qwen35-9b-dflash
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
    ipc: host
    command:
      - --model
      - Qwen/Qwen3.5-9B
      - --port
      - "8000"
      - --max-model-len
      - "65536"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --gpu-memory-utilization
      - "0.55"
      - --max-num-batched-tokens
      - "32768"
      - --attention-backend
      - flash_attn
      - --mm-processor-cache-type
      - shm
      - --mm-encoder-tp-mode
      - data
      - --speculative-config
      - '{"method": "dflash", "model": "z-lab/Qwen3.5-9B-DFlash", "num_speculative_tokens": 15}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
