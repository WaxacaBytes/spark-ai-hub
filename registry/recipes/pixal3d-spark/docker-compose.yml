services:
  pixal3d:
    image: ghcr.io/waxacabytes/pixal3d-spark-ai-hub:latest
    container_name: spark-ai-hub-pixal3d
    ports:
      - "12158:7860"
    volumes:
      - pixal3d-hf-cache:/workspace/cache/huggingface
      - pixal3d-triton-cache:/workspace/cache/triton
      - pixal3d-torch-cache:/workspace/cache/torch
      - pixal3d-output:/workspace/Pixal3D/tmp
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      HF_HOME: "/workspace/cache/huggingface"
      TRITON_CACHE_DIR: "/workspace/cache/triton"
      TORCH_HOME: "/workspace/cache/torch"
      ATTN_BACKEND: "flash-attn"
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  pixal3d-hf-cache:
  pixal3d-triton-cache:
  pixal3d-torch-cache:
  pixal3d-output:
