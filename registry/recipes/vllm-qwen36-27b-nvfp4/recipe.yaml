description: "Qwen3.6-27B NVFP4 (NVIDIA) on vLLM with MTP speculative decoding. NVIDIA's ModelOpt mixed-precision quant (W4A16 NVFP4 MLPs + FP8 attention) with fp8 KV cache on the flashinfer backend, accelerated ~2.3x by the checkpoint's built-in multi-token-prediction head. (DFlash is not usable here: its drafter needs flash_attn, incompatible with the forced fp8 KV.)"
