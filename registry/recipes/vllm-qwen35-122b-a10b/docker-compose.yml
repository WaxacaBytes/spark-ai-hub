services:
  vllm:
    image: scitrera/dgx-spark-vllm:0.17.0-t4
    container_name: sparkdeck-vllm-qwen35-122b-a10b
    ports:
      - "8015:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    ipc: host
    command:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
      - --model
      - Qwen/Qwen3.5-122B-A10B-GPTQ-Int4
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --quantization
      - moe_wna16
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "4096"
      - --gpu-memory-utilization
      - "0.85"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
