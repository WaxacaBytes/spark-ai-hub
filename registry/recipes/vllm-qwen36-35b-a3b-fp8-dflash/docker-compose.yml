services:
  vllm:
    build:
      context: .
      dockerfile_inline: |
        FROM vllm/vllm-openai:v0.20.0-aarch64-cu130
        RUN apt-get update -qq \
         && apt-get install -y --no-install-recommends git \
         && rm -rf /var/lib/apt/lists/* \
         && pip install --no-cache-dir git+https://github.com/z-lab/dflash.git \
         && pip cache purge || true
    image: spark-ai-hub/vllm-qwen36-35b-a3b-fp8-dflash:v0.20.0-aarch64-cu130
    container_name: spark-ai-hub-vllm-qwen36-35b-a3b-fp8-dflash
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
    ipc: host
    command:
      - --model
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --port
      - "8000"
      - --max-model-len
      - "262144"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --gpu-memory-utilization
      - "0.55"
      # Bound prefill and sequence concurrency for 4-5 developer sessions so
      # one long reasoning request does not starve active decodes.
      - --enable-chunked-prefill
      - --max-num-batched-tokens
      - "4096"
      - --max-num-seqs
      - "5"
      - --enable-prefix-caching
      - --attention-backend
      - flash_attn
      - --mm-processor-cache-type
      - shm
      - --mm-encoder-tp-mode
      - data
      - --speculative-config
      - '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 10}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
