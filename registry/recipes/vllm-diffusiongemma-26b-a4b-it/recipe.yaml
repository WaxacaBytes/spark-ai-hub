name: "DiffusionGemma-26B-A4B (BF16)"
slug: vllm-diffusiongemma-26b-a4b-it
version: "1.0.0"
description: "Google's DiffusionGemma-26B-A4B — a discrete diffusion language model on the Gemma 4 MoE architecture (25.2B total / 3.8B active, 8+1 experts). Instead of left-to-right decoding it denoises tokens in parallel 256-token canvases. Full-precision BF16 weights, image-text-to-text (vision in), 256K context, served on vLLM's Gemma4 image with the V2 model runner, Triton attention, and gemma4 reasoning + tool parsing."
author: "Google"
source: "official"
website: "https://huggingface.co/google/diffusiongemma-26B-A4B-it"
upstream: "https://huggingface.co/google/diffusiongemma-26B-A4B-it"
category: llm
