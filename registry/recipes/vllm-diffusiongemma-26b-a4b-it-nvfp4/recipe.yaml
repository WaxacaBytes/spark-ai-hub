description: "NVIDIA's NVFP4 (4-bit) build of Google's DiffusionGemma-26B-A4B — a discrete diffusion language model on the Gemma 4 MoE architecture (25.2B total / 3.8B active). Generates tokens in parallel 256-token blocks instead of left-to-right, served on vLLM's Gemma4 image with the V2 model runner, Triton attention, and gemma4 reasoning + tool parsing. ~3x smaller than BF16, 256K context."
