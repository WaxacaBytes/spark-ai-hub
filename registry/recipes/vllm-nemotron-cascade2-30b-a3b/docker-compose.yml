services:
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: sparkdeck-vllm-nemotron-cascade2-30b-a3b
    ports:
      - "8053:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - nvidia/Nemotron-Cascade-2-30B-A3B
      - --port
      - "8000"
      - --max-model-len
      - "262144"
      - --reasoning-parser
      - nemotron_v3
      - --mamba-ssm-cache-dtype
      - float32
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --trust-remote-code
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.50"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
